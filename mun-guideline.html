<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MUN Guideline</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    /* Reuse local term styles for a consistent look */
    body { margin: 0; min-height: 100vh; font-family: 'Segoe UI', Arial, sans-serif; background: url('background.jpg') no-repeat center center/cover; color: #fff; display: flex; justify-content: center; align-items: flex-start; padding: 24px; box-sizing: border-box; }
    .container { width: min(96%, 1000px); background: rgba(0,0,20,0.55); border-radius: 14px; border: 1px solid rgba(255,255,255,0.35); padding: 18px; box-shadow: 0 8px 28px rgba(0,0,0,0.4); backdrop-filter: blur(7px); }
    .title { font-size: 2.2rem; font-weight: 700; text-align: center; margin-bottom: 8px; text-shadow: 0 2px 14px rgba(0,0,0,0.35); }
    .subtitle { font-size: 1.3rem; margin: 0; margin-bottom: 12px; text-align: center; color: #eff6ff; font-weight: 600; }
    .card { background: rgba(255,255,255,0.12); border: 1px solid rgba(255,255,255,0.45); border-radius: 12px; padding: 16px; margin-top: 12px; }
    .card p { margin: 12px 0; line-height: 1.5; font-size: 1.08rem; }
    .nav { display: flex; justify-content: space-between; gap: 10px; margin-top: 18px; flex-wrap: wrap; }
    .nav button, .nav a { background: rgba(255,255,255,0.18); border: 1px solid rgba(255,255,255,0.6); color: #fff; border-radius: 10px; padding: 10px 16px; font-size: 1rem; cursor: pointer; text-decoration: none; transition: transform 0.2s, background 0.2s; min-width: 120px; text-align: center; font-weight: 600; backdrop-filter: blur(4px); }
    .toggle-btn { background: rgba(100, 200, 255, 0.3); border: 1px solid rgba(100, 200, 255, 0.7); color: #a0d8ff; border-radius: 6px; padding: 8px 14px; font-size: 0.95rem; cursor: pointer; transition: background 0.2s, transform 0.2s; font-weight: 600; backdrop-filter: blur(4px); }
    #simpleExplanation { display: none; margin-top: 12px; padding: 14px; background: rgba(100, 180, 255, 0.15); border-left: 3px solid rgba(100, 200, 255, 0.6); border-radius: 6px; }
    #simpleExplanation.show { display: block; }
    .error { color: #ff9c9c; text-align: center; margin-top: 14px; }
  </style>
</head>
<body>
  <div class="container">
    <div class="title">MUN Guideline</div>
    <div class="subtitle" id="stepTitle">Loading...</div>

    <div class="card">
      <p id="advanced"><strong>Advanced:</strong> ...</p>

      <div class="explanation-toggle" style="text-align:center; margin-top:12px;">
        <button class="toggle-btn" id="toggleSimple">Struggling? Show simpler explanation</button>
      </div>

      <div id="simpleExplanation">
        <p><strong>Simpler Explanation:</strong> <span id="simpleText">...</span></p>
      </div>
    </div>

    <div class="nav">
      <button id="prevBtn">Previous</button>
      <a id="backBtn" href="index.html">Back to Home</a>
      <button id="nextBtn">Next</button>
    </div>

    <p class="error" id="errorText"></p>
  </div>

  <script src="mun-guidelines.js"></script>
</body>
</html>
