<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Profile - GlobAffairs</title>
	<link rel="stylesheet" href="style.css">
	<link rel="stylesheet" href="profile.css">
</head>
<body>
	<header>
		<a href="index.html" class="logo-link" aria-label="Go to homepage">
			<img src="globaffairs-logo.png" class="logo" alt="GlobAffairs Logo">
		</a>
		<nav class="main-nav">
			<ul>
				<li><a href="index.html">Home</a></li>
				<li><a href="quiz-selection.html">Quiz</a></li>
				<li><a href="terminology.html">Terminology</a></li>
				<li><a href="articles.html">Articles</a></li>
				<li><a href="#about">About</a></li>
				<li id="authLink"><a href="auth.html" class="login-link">Login</a></li>
			</ul>
		</nav>
		<!-- Profile Section (Top Right) -->
		<div id="profileSection" class="profile-section" style="display:none;">
			<button class="profile-btn" id="profileBtn">👤 <span id="profileName"></span></button>
			<div class="profile-dropdown" id="profileDropdown">
				<a href="#" id="profileViewBtn" class="profile-item">View Profile</a>
				<a href="#" id="logoutBtn" class="profile-item">Logout</a>
			</div>
		</div>
	</header>

	<div class="profile-container">
		<div class="profile-card">
			<h1>My Profile</h1>
			
			<div class="profile-info-section">
				<h2>Account Information</h2>
				<div class="info-group">
					<label>Name</label>
					<p id="displayName" class="info-value">-</p>
				</div>
				<div class="info-group">
					<label>Email</label>
					<p id="displayEmail" class="info-value">-</p>
				</div>
				<div class="info-group">
					<label>Member Since</label>
					<p id="displayCreatedAt" class="info-value">-</p>
				</div>
			</div>

			<div class="profile-actions">
				<button id="deleteAccountBtn" class="delete-btn">Delete Account</button>
				<a href="index.html" class="back-btn">Back to Home</a>
			</div>

			<div id="profileMessage" class="message"></div>
		</div>
	</div>

	<!-- Delete Confirmation Modal -->
	<div id="deleteModal" class="modal" style="display:none;">
		<div class="modal-content">
			<h2>Delete Account</h2>
			<p>Are you sure you want to delete your account? This action cannot be undone.</p>
			<p class="warning-text">⚠️ All your account data will be permanently deleted.</p>
			<div class="modal-buttons">
				<button id="confirmDeleteBtn" class="confirm-delete-btn">Yes, Delete My Account</button>
				<button id="cancelDeleteBtn" class="cancel-btn">Cancel</button>
			</div>
		</div>
	</div>

	<script src="script.js"></script>
	<script src="profile.js"></script>
</body>
</html>
