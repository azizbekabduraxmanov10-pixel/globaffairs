<!DOCTYPE html>

  <style>
    .practice-page { max-width: 1000px; margin: 32px auto; padding: 32px 24px; background: rgba(10, 18, 35, 0.45); border-radius: 28px; border: 1px solid rgba(255,255,255,0.08); box-shadow: 0 24px 60px rgba(0, 0, 0, 0.16); color: #fff; }

    .practice-page p { margin-bottom: 28px; color: #e8f2ff; font-size: 1.05rem; }

    .practice-category h2 { margin-top: 0; margin-bottom: 14px; font-size: 1.45rem; }
    .practice-subsections { list-style: none; margin: 0; padding: 0; }
    .practice-subsections li { margin-bottom: 12px; }
    .practice-subsections a { color: #cce6ff; text-decoration: none; font-weight: 600; }
    .practice-subsections a:hover { text-decoration: underline; }
    .status-tag { display: inline-block; margin-left: 10px; color: #d4d4d4; font-size: 0.92rem; background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.18); border-radius: 999px; padding: 4px 10px; }
